project: cfg-api
source:
  repoURL: https://embrio-tech.github.io/centrifuge-helm
  targetRevision: 0.1.50
  helm:
    values: |
      postgres:
        enabled: true
        cluster:
          storage:
            storageClass: perf3
          walStorage:
            storageClass: perf3
      global:
        erpcSecretName: cfg-api-v3-rpc-keys
        erpcAuthSecretName: cfg-api-v3-erpc-auth-keys
      redis:
        enabled: true
        master:
          persistence:
            storageClass: perf3
      erpc:
        replicaCount: 2
        image:
          tag: "0.0.64"
        database:
          evmJsonRpcCache:
            enabled: true
        ingress:
          enabled: true
          hosts:
            - host: erpc.cfg-us.embrio.tech
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: cfg-api-erpc-us-tls
              hosts:
                - erpc.cfg-us.embrio.tech
        config:
          logLevel: info
          server:
            maxTimeout: 180s
            trustedIPForwarders:
              - 10.42.0.0/16
              - 10.43.0.0/16
              - 192.168.42.0/24
            trustedIPHeaders:
              - X-Forwarded-For
              - X-Real-Ip
          projects:
            - id: main
              auth:
                strategies:
                  - type: network
                    network:
                      allowedCIDRs:
                        - 10.42.0.0/16
                      trustedProxies:
                        - 192.168.42.0/24
                        - 10.42.0.0/16
                        - 10.43.0.0/16
              networkDefaults:
                failsafe:
                  - matchMethod: "eth_getLogs"
                    timeout:
                      duration: 180s
                    retry:
                      maxAttempts: 3
                      delay: 0ms
                    hedge: null
                  - matchMethod: "*"
                    timeout:
                      duration: 30s
                    retry:
                      maxAttempts: 3
                      delay: 100ms
                    hedge: null
                evm:
                  getLogsSplitOnError: true
                  getLogsMaxAllowedRange: 10000
                  getLogsSplitConcurrency: 4
                directiveDefaults:
                  enforceHighestBlock: true
                  enforceGetLogsBlockRange: true
                  validateLogsBloomMatch: 
                  validateTransactionIndex: true
                  enforceLogIndexStrictIncrements: true
              upstreamDefaults:
                evm:
                  statePollerInterval: 2s
                failsafe:
                  - matchMethod: "eth_getLogs"
                    timeout:
                      duration: 180s
                    retry:
                      maxAttempts: 2
                      delay: 250ms
                      backoffFactor: 2
                    hedge: null
                  - matchMethod: "*"
                    timeout:
                      duration: 30s
                    retry:
                      maxAttempts: 2
                      delay: 250ms
                      backoffFactor: 2
                    hedge: null
              networks:
                - architecture: evm
                  evm:
                    chainId: 999
                    fallbackFinalityDepth: 40
                  directiveDefaults:
                    enforceHighestBlock: true
                    enforceGetLogsBlockRange: true
                    enforceNonNullTaggedBlocks: true
                    validateTransactionsRoot: false
                    validateTransactionBlockInfo: false
                    validateTransactionFields: false
                    validateLogsBloomMatch: false
                    validateTransactionIndex: false
                    enforceLogIndexStrictIncrements: false
                  selectionPolicy:
                    evalInterval: 15s
                    evalPerMethod: false
                    resampleExcluded: false
                    evalFunction: |
                      (upstreams, method) => {
                        const primaryId = "hl-quicknode-evm";
                        const fallbackId = "hl-alchemy-evm";

                        const maxErrorRate = 0.7;
                        const maxBlockHeadLag = 16;

                        const live = upstreams.filter(
                          (u) => u.id === "hl-quicknode-evm" || u.id === "hl-alchemy-evm"
                        );
                        const archive = upstreams.filter(
                          (u) => u.id === "hl-quicknode-nanoreth"
                        );

                        const isHealthy = (u) =>
                          u.metrics.errorRate < maxErrorRate
                          && u.metrics.blockHeadLag < maxBlockHeadLag;

                        const primary = live.find((u) => u.id === primaryId);
                        const fallback = live.find((u) => u.id === fallbackId);

                        const withFallback = (list, other) =>
                          other && !list.some((u) => u.id === other.id)
                            ? list.concat([other])
                            : list;

                        let activeLive = [];
                        if (primary && isHealthy(primary)) {
                          activeLive = withFallback([primary], fallback);
                        } else if (fallback && isHealthy(fallback)) {
                          activeLive = withFallback([fallback], primary);
                        } else if (primary) {
                          activeLive = withFallback([primary], fallback);
                        } else if (fallback) {
                          activeLive = withFallback([fallback], primary);
                        } else if (live.length > 0) {
                          activeLive = [live[0]];
                        }

                        const blockOrLogMethod =
                          method === "eth_getBlockByNumber"
                          || method === "eth_getBlockByHash"
                          || method === "eth_getLogs";

                        // === HYPERLIQUID LIVE MODE (default) ===
                        // QN /evm primary; Alchemy second in pool (full HL history, failover on QN errors).
                        // Nanoreth excluded from block/log: getLogs({ blockHash }) skips blockAvailability on 0.0.64.
                        if (blockOrLogMethod) {
                          return activeLive;
                        }

                        // === HYPERLIQUID BACKFILL MODE ===
                        // Stop live Ponder on HL (or use a dedicated backfill RPC URL), then:
                        // 1. Comment out the LIVE "if (blockOrLogMethod)" block above.
                        // 2. Uncomment the BACKFILL block below.
                        // 3. Comment out eth_getLogs under hl-quicknode-nanoreth ignoreMethods.
                        // if (method === "eth_getBlockByNumber" || method === "eth_getLogs") {
                        //   return activeLive.concat(archive);
                        // }
                        // if (blockOrLogMethod) {
                        //   return activeLive;
                        // }

                        return activeLive.concat(archive);
                      }
                  failsafe:
                    - matchMethod: "eth_getBlockByNumber|eth_getBlockByHash"
                      timeout:
                        duration: 180s
                      retry:
                        maxAttempts: 1
                        delay: 0ms
                      hedge: null
                    - matchMethod: "eth_getLogs"
                      timeout:
                        duration: 180s
                      retry:
                        maxAttempts: 2
                        delay: 0ms
                      hedge: null
                    - matchMethod: "*"
                      timeout:
                        duration: 30s
                      retry:
                        maxAttempts: 2
                        delay: 250ms
                        backoffFactor: 2
                      hedge: null
                - architecture: evm
                  evm:
                    chainId: 42161
                    fallbackFinalityDepth: 20
                - architecture: evm
                  evm:
                    chainId: 8453
                    fallbackFinalityDepth: 3
                - architecture: evm
                  evm:
                    chainId: 84532
                    fallbackFinalityDepth: 3
                - architecture: evm
                  evm:
                    chainId: 98866
                    fallbackFinalityDepth: 10
              upstreams:
                - id: hl-quicknode-evm
                  endpoint: '${QUICKNODE_HYPE_RPC}/evm'
                  failsafe:
                    - matchMethod: "eth_getBlockByNumber|eth_getBlockByHash"
                      timeout:
                        duration: 180s
                      retry:
                        maxAttempts: 1
                        delay: 0ms
                      hedge: null
                    - matchMethod: "eth_getLogs"
                      timeout:
                        duration: 180s
                      retry:
                        maxAttempts: 2
                        delay: 0ms
                      hedge: null
                  routing:
                    scoreMultipliers:
                      - overall: 1
                  evm:
                    chainId: 999
                    blockAvailability:
                      lower:
                        latestBlockMinus: 180000
                      upper:
                        latestBlockMinus: 0

                - id: hl-quicknode-nanoreth
                  endpoint: '${QUICKNODE_HYPE_RPC}/nanoreth'
                  ignoreMethods:
                    - eth_getBlockByHash
                    - eth_getLogs
                    # BACKFILL: comment out eth_getLogs above so nanoreth can serve cold range getLogs.
                  failsafe:
                    - matchMethod: "eth_getBlockByNumber|eth_getBlockByHash|eth_getLogs"
                      timeout:
                        duration: 180s
                      retry:
                        maxAttempts: 1
                        delay: 0ms
                      hedge: null
                  routing:
                    scoreMultipliers:
                      - overall: 1
                  evm:
                    chainId: 999
                    blockAvailability:
                      upper:
                        latestBlockMinus: 1024

                - id: hl-alchemy-evm
                  endpoint: 'https://hyperliquid-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}'
                  failsafe:
                    - matchMethod: "eth_getBlockByNumber|eth_getBlockByHash"
                      timeout:
                        duration: 180s
                      retry:
                        maxAttempts: 1
                        delay: 0ms
                      hedge: null
                    - matchMethod: "eth_getLogs"
                      timeout:
                        duration: 180s
                      retry:
                        maxAttempts: 2
                        delay: 0ms
                      hedge: null
                  routing:
                    scoreMultipliers:
                      - overall: 1
                  evm:
                    chainId: 999
                    blockAvailability:
                      upper:
                        latestBlockMinus: 0
                - endpoint: https://rpc.plume.org/${CONDUIT_API_KEY}
                  evm:
                    chainId: 98866
                - endpoint: https://pharos-mainnet.g.alchemy.com/v2/${PHAROS_API_KEY}
                  evm:
                    chainId: 1672
                - id: monad-historical
                  endpoint: https://rpc-mainnet.monadinfra.com
                  evm:
                    chainId: 143
                  allowMethods:
                    - eth_call
              providers:
                - vendor: quicknode
                  settings:
                    apiKey: ${QUICKNODE_MASTER_API_KEY}
                  ignoreNetworks:
                    - evm:999
                  overrides:
                    "evm:143":
                      ignoreMethods:
                        - eth_call
                    "evm:*":
                      routing:
                        scoreMultipliers:
                          - network: ""
                            method: ""
                            overall: 1
                - vendor: alchemy
                  settings:
                    apiKey: ${ALCHEMY_API_KEY}
                  ignoreNetworks:
                    - evm:999
                  overrides:
                    "evm:143":
                      ignoreMethods:
                        - eth_call
                    "evm:*":
                      routing:
                        scoreMultipliers:
                          - network: ""
                            method: ""
                            overall: 0.33
                - vendor: drpc
                  settings:
                    apiKey: ${DRPC_API_KEY}
                  ignoreNetworks:
                    - evm:999
                  overrides:
                    "evm:143":
                      ignoreMethods:
                        - eth_call
                    "evm:*":
                      routing:
                        scoreMultipliers:
                          - network: ""
                            method: ""
                            overall: 1
  chart: erpc
destination:
  namespace: cfg-api
  name: beta
