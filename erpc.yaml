project: cfg-api
source:
  repoURL: https://embrio-tech.github.io/centrifuge-helm
  targetRevision: 0.1.50
  helm:
    values: |
      postgres:
        enabled: true
        cluster:
          instances: 1
      global:
        erpcSecretName: cfg-api-v3-rpc-keys
        erpcAuthSecretName: cfg-api-v3-auth-keys
        erpcAuthSecretKeys:
          - ERPC_KEY_BETA
      redis:
        enabled: true
      erpc:
        replicaCount: 3
        database:
          evmJsonRpcCache:
            enabled: true
        ingress:
          enabled: true
          hosts:
            - host: erpc.cfg.embrio.tech
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: cfg-api-erpc-tls
              hosts:
                - erpc.cfg.embrio.tech
        config:
          logLevel: info
          server:
            maxTimeout: 180s
            trustedIPForwarders:
              - 10.42.0.0/16
              - 10.43.0.0/16
              - 192.168.42.0/24
            trustedIPHeaders:
              - X-Forwarded-For
              - X-Real-Ip
          projects:
            - id: main
              auth:
                strategies:
                  - type: network
                    network:
                      allowedCIDRs:
                        - 10.42.0.0/16
                      trustedProxies:
                        - 192.168.42.0/24
                        - 10.42.0.0/16
                        - 10.43.0.0/16
              networkDefaults:
                failsafe:
                  - matchMethod: "eth_getLogs"
                    timeout:
                      duration: 180s
                    retry:
                      maxAttempts: 3
                      delay: 0ms
                    hedge: null
                  - matchMethod: "*"
                    timeout:
                      duration: 30s
                    retry:
                      maxAttempts: 3
                      delay: 100ms
                    hedge: null
                evm:
                  getLogsSplitOnError: true
                  getLogsMaxAllowedRange: 10000
                  getLogsSplitConcurrency: 4
                directiveDefaults:
                  enforceHighestBlock: true
                  enforceGetLogsBlockRange: true
                  validateLogsBloomMatch: 
                  validateTransactionIndex: true
                  enforceLogIndexStrictIncrements: true
              upstreamDefaults:
                evm:
                  statePollerInterval: 2s
                failsafe:
                  - matchMethod: "eth_getLogs"
                    timeout:
                      duration: 180s
                    retry:
                      maxAttempts: 2
                      delay: 250ms
                      backoffFactor: 2
                    hedge: null
                  - matchMethod: "*"
                    timeout:
                      duration: 30s
                    retry:
                      maxAttempts: 2
                      delay: 250ms
                      backoffFactor: 2
                    hedge: null
              networks:
                - architecture: evm
                  evm:
                    chainId: 999
                    fallbackFinalityDepth: 40
                - architecture: evm
                  evm:
                    chainId: 42161
                    fallbackFinalityDepth: 20
                - architecture: evm
                  evm:
                    chainId: 8453
                    fallbackFinalityDepth: 10
                - architecture: evm
                  evm:
                    chainId: 84532
                    fallbackFinalityDepth: 10
                - architecture: evm
                  evm:
                    chainId: 98866
                    fallbackFinalityDepth: 10
              upstreams:
                - endpoint: '${QUICKNODE_HYPE_RPC}/evm' #nanoreth
                  evm:
                    chainId: 999
                - endpoint: 'https://hyperliquid-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}' #evm
                  evm:
                    chainId: 999
                - endpoint: https://rpc.plume.org/${CONDUIT_API_KEY}
                  evm:
                    chainId: 98866
                - endpoint: https://pharos-mainnet.g.alchemy.com/v2/${PHAROS_API_KEY}
                  evm:
                    chainId: 1672
                - id: monad-historical
                  endpoint: https://rpc-mainnet.monadinfra.com
                  evm:
                    chainId: 143
                  allowMethods:
                    - eth_call
              providers:
                - vendor: quicknode
                  settings:
                    apiKey: ${QUICKNODE_MASTER_API_KEY}
                  ignoreNetworks:
                    - evm:999
                  overrides:
                    "evm:143":
                      ignoreMethods:
                        - eth_call
                    "evm:*":
                      routing:
                        scoreMultipliers:
                          - network: ""
                            method: ""
                            overall: 1
                - vendor: alchemy
                  settings:
                    apiKey: ${ALCHEMY_API_KEY}
                  overrides:
                    "evm:143":
                      ignoreMethods:
                        - eth_call
                    "evm:*":
                      routing:
                        scoreMultipliers:
                          - network: ""
                            method: ""
                            overall: 0.33
                - vendor: drpc
                  settings:
                    apiKey: ${DRPC_API_KEY}
                  overrides:
                    "evm:143":
                      ignoreMethods:
                        - eth_call
                    "evm:*":
                      routing:
                        scoreMultipliers:
                          - network: ""
                            method: ""
                            overall: 1
  chart: erpc
destination:
  server: https://kubernetes.default.svc
  namespace: cfg-api
