nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

# Neither upstream nor auth Secrets are deployed by this chart. For migration you may point upstream and auth at the same Secret name(s).
global:
  # -- Existing Secret: upstream RPC provider keys and related infra (${VAR} in erpc.config), e.g. ALCHEMY_API_KEY, QUICKNODE_MASTER_API_KEY, QUICKNODE_API_NAME + QUICKNODE_API_KEY (Hyperliquid nanoreth URL), CONDUIT_API_KEY (Plume rpc.plume.org path), DRPC_API_KEY, PHAROS_API_KEY, REDIS_SHARED_STATE_URI, POSTGRES_CACHE_URI.
  erpcSecretName: erpc-secrets
  # -- Predeployed Secret metadata.name holding auth values; keys below must exist as Secret data keys (become env vars for ${KEY} in eRPC config).
  erpcAuthSecretName: erpc-auth-secrets
  # -- Data keys inside that Secret; chart appends one `type: secret` strategy per key (value: ${KEY}) on the auth project.
  erpcAuthSecretKeys: []

erpc:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/erpc/erpc
    pullPolicy: IfNotPresent
    # Pin to the eRPC version you run; `erpc.config` must match that binary's schema (default matches Chart appVersion).
    tag: "0.0.63"

  config:
    logLevel: info
    server:
      maxTimeout: 180s
      trustedIPForwarders:
        - 10.42.0.0/16
        - 10.43.0.0/16
        - 192.168.42.0/24
      trustedIPHeaders:
        - X-Forwarded-For
        - X-Real-Ip
    projects:
      - id: main
        auth:
          strategies:
            - type: network
              network:
                allowedCIDRs:
                  - 10.42.0.0/16
                trustedProxies:
                  - 192.168.42.0/24
                  - 10.42.0.0/16
                  - 10.43.0.0/16
        networkDefaults:
          failsafe:
            - matchMethod: "eth_getLogs"
              timeout:
                duration: 180s
              retry:
                maxAttempts: 3
                delay: 100ms
              hedge: null
            - matchMethod: "*"
              timeout:
                duration: 30s
              retry:
                maxAttempts: 3
                delay: 100ms
              hedge: null
          evm:
            getLogsSplitOnError: true
            getLogsMaxAllowedRange: 10000
            getLogsSplitConcurrency: 4
            integrity:
              enforceHighestBlock: true
              enforceGetLogsBlockRange: true
        upstreamDefaults:
          evm:
            statePollerInterval: 2s
          failsafe:
            - matchMethod: "eth_getLogs"
              timeout:
                duration: 60s
              retry:
                maxAttempts: 2
                delay: 250ms
                backoffFactor: 2
              hedge: null
            - matchMethod: "*"
              timeout:
                duration: 15s
              retry:
                maxAttempts: 2
                delay: 250ms
                backoffFactor: 2
              hedge: null
        networks:
          - architecture: evm
            evm:
              chainId: 999
              fallbackFinalityDepth: 17
          - architecture: evm
            evm:
              chainId: 42161
              fallbackFinalityDepth: 20
          - architecture: evm
            evm:
              chainId: 8453
              fallbackFinalityDepth: 3
          - architecture: evm
            evm:
              chainId: 84532
              fallbackFinalityDepth: 3
          - architecture: evm
            evm:
              chainId: 98866
              fallbackFinalityDepth: 10
        upstreams:
          - endpoint: "https://${QUICKNODE_API_NAME}.quiknode.pro/${QUICKNODE_API_KEY}/nanoreth"
            id: upstream-hyperliquid-quicknode-nanoreth
            evm:
              chainId: 999
          - endpoint: "https://rpc.plume.org/${CONDUIT_API_KEY}"
            id: upstream-plume-conduit
            evm:
              chainId: 98866
          - endpoint: drpc://${DRPC_API_KEY}
            id: upstream-drpc
          - endpoint: https://pharos-mainnet.g.alchemy.com/v2/${PHAROS_API_KEY}
            id: alchemy-pharos
            evm:
              chainId: 1672
        providers:
          - vendor: quicknode
            settings:
              apiKey: ${QUICKNODE_MASTER_API_KEY}
            ignoreNetworks:
              - evm:999
              - evm:98866
          - vendor: alchemy
            settings:
              apiKey: ${ALCHEMY_API_KEY}
            ignoreNetworks:
              - evm:999
              - evm:1672
              - evm:98866
  # -- Override upstream RPC Secret name (defaults to global.erpcSecretName)
  secretName: ""
  # -- Override predeployed auth Secret name (defaults to global.erpcAuthSecretName)
  authSecretName: ""
  # -- Override list of Secret data keys used for `type: secret` strategies (defaults to global.erpcAuthSecretKeys when empty)
  authSecretKeys: []
  # -- Project id to inject secret strategies into (default main)
  authSecretKeysProjectId: ""

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  env:
    - name: GOGC
      value: "40"
    - name: GOMEMLIMIT
      value: "1900MiB"

  service:
    type: ClusterIP
    httpPort: 4000
    metricsPort: 4001

  ingress:
    enabled: false
    className: "traefik"
    annotations:
      kubernetes.io/tls-acme: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts: []
    tls: []

  terminationGracePeriodSeconds: 180

  startupProbe:
    httpGet:
      path: /healthcheck
      port: 4000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    httpGet:
      path: /healthcheck
      port: 4000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 2
    successThreshold: 1

  livenessProbe:
    tcpSocket:
      port: 4000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 80
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80

  # -- Prometheus ServiceMonitor for kube-prometheus-stack (in namespace monitoring).
  #    ServiceMonitor is created in the release namespace by default so Prometheus can discover
  #    the eRPC service; ensure Prometheus watches this namespace (e.g. serviceMonitorNamespaceSelector)
  #    or add labels so your Prometheus instance selects this monitor (e.g. release: kube-prometheus-stack).
  metrics:
    serviceMonitor:
      enabled: false
      # -- Leave empty to use release namespace. Set only if deploying eRPC into the monitoring namespace.
      namespace: ""
      interval: 30s
      # -- Labels for Prometheus serviceMonitorSelector. For kube-prometheus-stack use:
      #    release: kube-prometheus-stack
      labels: {}
      scrapeTimeout: 10s

  database:
    sharedState:
      enabled: true
    evmJsonRpcCache:
      enabled: false
      useCnpgAppSecret: true
      postgresql:
        minConns: 2
        maxConns: 20

# -- Bitnami Redis — shared state backend per https://docs.erpc.cloud/config/database/shared-state
#   Service: `<release-name>-redis-master:6379`
redis:
  enabled: false
  architecture: standalone
  auth:
    # Set true in production; use password or existingSecret, then wire the same secret into eRPC.
    enabled: false
    password: ""
    # existingSecret: ""
    # existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 8Gi
      # -- Redis PVC storageClassName; empty uses the cluster default StorageClass.
      storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

# -- CloudNative-PG. With evmJsonRpcCache, eRPC reads `uri` from `<clusterfullname>-app` (operator-managed).
#   Optional: set cluster.initdb.database (e.g. erpc_cache) on *new* clusters to isolate the cache DB.
postgres:
  enabled: false
  cluster:
    instances: 1
    storage:
      size: 128Gi
      storageClass: "ceph-perf3"
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 4Gi
    affinity:
      topologyKey: topology.cinder.csi.openstack.org/zone
    postgresql:
      parameters:
        # eRPC-only (e.g. 2 pods × evmJsonRpcCache.postgresql.maxConns 20 ≈ 40) + CNPG/metrics headroom.
        # Raise if you add replicas, other apps, or still see SQLSTATE 53300.
        max_connections: "150"
