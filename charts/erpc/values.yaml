nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

# Neither upstream nor auth Secrets are deployed by this chart. For migration you may point upstream and auth at the same Secret name(s).
global:
  # -- Existing Secret: upstream RPC provider keys and related infra (${VAR} in erpc.config), e.g. ALCHEMY_API_KEY, QUICKNODE_MASTER_API_KEY, QUICKNODE_API_NAME + QUICKNODE_API_KEY (Hyperliquid nanoreth URL), CONDUIT_API_KEY (Plume rpc.plume.org path), DRPC_API_KEY, PHAROS_API_KEY, REDIS_SHARED_STATE_URI, POSTGRES_CACHE_URI.
  erpcSecretName: erpc-secrets
  # -- Predeployed Secret metadata.name holding auth values; keys below must exist as Secret data keys (become env vars for ${KEY} in eRPC config).
  erpcAuthSecretName: erpc-auth-secrets
  # -- Data keys inside that Secret; chart appends one `type: secret` strategy per key (value: ${KEY}) on the auth project.
  erpcAuthSecretKeys: []

erpc:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/erpc/erpc
    pullPolicy: IfNotPresent
    # Pin to your running eRPC (e.g. "0.0.63"); `erpc.config` keys must match that release’s schema.
    tag: "latest"

  # -- eRPC config (erpc.yaml) as structured YAML so production can override subtrees (e.g. erpc.config.projects).
  #   Legacy: set erpc.config to a single multiline string of YAML; chart still accepts that form.
  #   Use ${VAR} from global.erpcSecretName (upstream). Auth API keys: global.erpcAuthSecretName + global.erpcAuthSecretKeys (injected as secret strategies); see global comments.
  #   When redis.enabled + database.sharedState.enabled, chart appends database.sharedState (Redis) per
  #   https://docs.erpc.cloud/config/database/shared-state
  #   When database.evmJsonRpcCache.enabled + postgres.enabled, POSTGRES_CACHE_URI defaults to CloudNativePG
  #   app secret `<cluster>-app` key `uri`. Override POSTGRES_CACHE_URI in the upstream Secret only if useCnpgAppSecret: false.
  config:
    logLevel: info
    # Trust in-cluster hops (e.g. Traefik) so resolveRealClientIP reads X-Forwarded-For / X-Real-Ip before auth.
    # Without server.trustedIPForwarders + trustedIPHeaders, ClientIP() stays as RemoteAddr (often a pod in 10.42.0.0/16) and project network.allowedCIDRs matches everyone.
    # Align trustedIPForwarders with actual TCP peers to eRPC; project auth.network.trustedProxies is separate (eRPC docs vs server IP trust).
    server:
      # Must be >= longest network-level failsafe timeout; default in erpc.dist.yaml is 50s.
      maxTimeout: 180s
      trustedIPForwarders:
        - 10.42.0.0/16
        - 10.43.0.0/16
        - 192.168.42.0/24
      trustedIPHeaders:
        - X-Forwarded-For
        - X-Real-Ip
    projects:
      - id: main
        # Auth (https://docs.erpc.cloud/config/auth): strategies are OR'd — satisfy network (in-cluster IP) OR secret (public).
        # - Internal: call the ClusterIP Service; client IP is a pod IP → allowedCIDRs (override if your pod CIDR is not 10.42.0.0/16).
        # - Public: use Ingress hostname; requires server.trustedIPForwarders/Headers so ClientIP() is the real IP; then network vs allowedCIDRs and/or secret strategies apply.
        #   `type: secret` strategies are generated from global.erpcAuthSecretKeys (keys in global.erpcAuthSecretName); add keys there for more API keys (OR across strategies).
        # Tighten trustedProxies if your ingress/proxy topology differs; too broad weakens IP-based checks.
        auth:
          strategies:
            - type: network
              network:
                allowedCIDRs:
                  - 10.42.0.0/16
                trustedProxies:
                  - 192.168.42.0/24
                  - 10.42.0.0/16
                  - 10.43.0.0/16
        # Applies to every network, including when traffic uses direct-provider upstreams (not only the peer eRPC).
        networkDefaults:
          failsafe:
            # Network timeout is the full client request budget (including upstream retries).
            # Cross-region → main eRPC + heavy eth_getLogs often exceeds 15s; list eth_getLogs first (first match wins).
            - matchMethod: "eth_getLogs"
              timeout:
                duration: 180s
              retry:
                maxAttempts: 3
                delay: 100ms
              hedge: null
            - matchMethod: "*"
              timeout:
                duration: 30s
              retry:
                maxAttempts: 3
                delay: 100ms
              hedge: null # no hedging (avoids integrity issues from parallel upstreams)
          evm:
            getLogsSplitOnError: true
            # Ponder/viem often request >1k blocks per eth_getLogs; too low rejects with "exceeded max allowed range".
            getLogsMaxAllowedRange: 10000
            getLogsSplitConcurrency: 4
            integrity:
              enforceHighestBlock: true
              enforceGetLogsBlockRange: true
        # Merged into each upstream; important when selection falls through to QuickNode/dRPC/Alchemy/repository.
        upstreamDefaults:
          evm:
            statePollerInterval: 2s
          failsafe:
            - matchMethod: "eth_getLogs"
              timeout:
                duration: 60s
              retry:
                maxAttempts: 2
                delay: 250ms
                backoffFactor: 2
              hedge: null
            - matchMethod: "*"
              timeout:
                duration: 15s
              retry:
                maxAttempts: 2
                delay: 250ms
                backoffFactor: 2
              hedge: null
        # Per-chain tuning (EvmNetworkConfig): no statePollerInterval here - use upstreamDefaults / provider overrides (eRPC 0.0.x schema).
        networks:
          - architecture: evm
            evm:
              chainId: 999
              fallbackFinalityDepth: 17
          - architecture: evm
            evm:
              chainId: 42161
              fallbackFinalityDepth: 20
          - architecture: evm
            evm:
              chainId: 8453
              fallbackFinalityDepth: 3
          - architecture: evm
            evm:
              chainId: 84532
              fallbackFinalityDepth: 3
          - architecture: evm
            evm:
              chainId: 98866
              fallbackFinalityDepth: 10
        upstreams:
          # Hyperliquid: explicit /nanoreth JSON-RPC (evm:999 on ignoreNetworks for quicknode provider below).
          - endpoint: "https://${QUICKNODE_API_NAME}.quiknode.pro/${QUICKNODE_API_KEY}/nanoreth"
            id: upstream-hyperliquid-quicknode-nanoreth
            evm:
              chainId: 999
          # Plume mainnet (98866): Conduit-hosted RPC; dedicated upstream (not conduit:// provider).
          - endpoint: "https://rpc.plume.org/${CONDUIT_API_KEY}"
            id: upstream-plume-conduit
            evm:
              chainId: 98866
          - endpoint: drpc://${DRPC_API_KEY}
            id: upstream-drpc
          - endpoint: https://pharos-mainnet.g.alchemy.com/v2/${PHAROS_API_KEY}
            id: alchemy-pharos
            evm:
              chainId: 1672
        # Providers use ignoreNetworks for chains served by dedicated upstreams (999, 98866, 1672 pharos, …).
        providers:
          - vendor: quicknode
            settings:
              apiKey: ${QUICKNODE_MASTER_API_KEY}
            ignoreNetworks:
              - evm:999
              - evm:98866
          - vendor: alchemy
            settings:
              apiKey: ${ALCHEMY_API_KEY}
            ignoreNetworks:
              - evm:999
              - evm:1672
              - evm:98866
          - vendor: repository
            settings:
              repositoryUrl: https://evm-public-endpoints.erpc.cloud
            ignoreNetworks:
              - evm:999
              - evm:98866
              - evm:8453
              - evm:42161
              - evm:84532
            overrides:
              "evm:1":
                group: fallback
                evm:
                  statePollerInterval: 30s

  # -- Override upstream RPC Secret name (defaults to global.erpcSecretName)
  secretName: ""
  # -- Override predeployed auth Secret name (defaults to global.erpcAuthSecretName)
  authSecretName: ""
  # -- Override list of Secret data keys used for `type: secret` strategies (defaults to global.erpcAuthSecretKeys when empty)
  authSecretKeys: []
  # -- Project id to inject secret strategies into (default main)
  authSecretKeysProjectId: ""

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  env:
    - name: GOGC
      value: "40"
    - name: GOMEMLIMIT
      value: "1900MiB"

  service:
    type: ClusterIP
    httpPort: 4000
    metricsPort: 4001

  ingress:
    enabled: false
    className: "traefik"
    annotations:
      kubernetes.io/tls-acme: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Example when enabled (tls MUST live under ingress, with secretName + hosts per item — not erpc.tls, not a bare secret name):
    # hosts:
    #   - host: erpc.cfg.embrio.tech
    #     paths:
    #       - path: /
    #         pathType: Prefix
    # tls:
    #   - secretName: cfg-api-erpc-tls
    #     hosts:
    #       - erpc.cfg.embrio.tech
    hosts: []
    tls: []

  # -- Must be same or greater than server.maxTimeout in erpc.yaml
  terminationGracePeriodSeconds: 180

  startupProbe:
    httpGet:
      path: /healthcheck
      port: 4000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    httpGet:
      path: /healthcheck
      port: 4000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 2
    successThreshold: 1

  livenessProbe:
    tcpSocket:
      port: 4000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 80
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80

  # -- Prometheus ServiceMonitor for kube-prometheus-stack (in namespace monitoring).
  #    ServiceMonitor is created in the release namespace by default so Prometheus can discover
  #    the eRPC service; ensure Prometheus watches this namespace (e.g. serviceMonitorNamespaceSelector)
  #    or add labels so your Prometheus instance selects this monitor (e.g. release: kube-prometheus-stack).
  metrics:
    serviceMonitor:
      enabled: false
      # -- Leave empty to use release namespace. Set only if deploying eRPC into the monitoring namespace.
      namespace: ""
      interval: 30s
      # -- Labels for Prometheus serviceMonitorSelector. For kube-prometheus-stack use:
      #    release: kube-prometheus-stack
      labels: {}
      scrapeTimeout: 10s

  # Database integration (merged into erpc.yaml unless you already define the same keys).
  database:
    # Shared state across replicas via Redis (recommended for HPA). Ignored if redis.enabled is false.
    # With redis.auth.enabled, set REDIS_SHARED_STATE_URI in the upstream Secret (full redis://... URI).
    sharedState:
      enabled: true
    # Persistent EVM JSON-RPC cache on PostgreSQL (see postgres.enabled). Uses CNPG app credentials by default.
    evmJsonRpcCache:
      enabled: false
      # When true (default): POSTGRES_CACHE_URI from secret `<cnpg-cluster>-app`, key `uri` (same as CloudNative-PG app user).
      # Set false to supply POSTGRES_CACHE_URI only via the upstream Secret (external Postgres).
      useCnpgAppSecret: true
      # Postgres cache pool per eRPC pod (https://github.com/erpc/erpc/blob/main/common/config.go — PostgreSQLConnectorConfig).
      # Keep (erpc.replicaCount * maxConns) well below postgres max_connections (see postgres.cluster.postgresql.parameters).
      postgresql:
        minConns: 2
        maxConns: 20

# -- Bitnami Redis — shared state backend per https://docs.erpc.cloud/config/database/shared-state
#   Service: `<release-name>-redis-master:6379`
redis:
  enabled: false
  architecture: standalone
  auth:
    # Set true in production; use password or existingSecret, then wire the same secret into eRPC.
    enabled: false
    password: ""
    # existingSecret: ""
    # existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 8Gi
      # -- Redis PVC storageClassName; empty uses the cluster default StorageClass.
      storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

# -- CloudNative-PG. With evmJsonRpcCache, eRPC reads `uri` from `<clusterfullname>-app` (operator-managed).
#   Optional: set cluster.initdb.database (e.g. erpc_cache) on *new* clusters to isolate the cache DB.
postgres:
  enabled: false
  cluster:
    instances: 1
    storage:
      size: 128Gi
      storageClass: "ceph-perf3"
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 4Gi
    affinity:
      topologyKey: topology.cinder.csi.openstack.org/zone
    postgresql:
      parameters:
        # eRPC-only (e.g. 2 pods × evmJsonRpcCache.postgresql.maxConns 20 ≈ 40) + CNPG/metrics headroom.
        # Raise if you add replicas, other apps, or still see SQLSTATE 53300.
        max_connections: "150"
