nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

# -- Reference to existing secret in the same namespace containing eRPC secrets (e.g. ALCHEMY_API_KEY, CONDUIT_API_KEY, QUICKNODE_API_KEY, DRPC_API_KEY).
#   Not deployed by this chart; must exist before deployment.
global:
  erpcSecretName: erpc-secrets

erpc:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/erpc/erpc
    pullPolicy: IfNotPresent
    tag: "latest"

  # -- eRPC base config (erpc.yaml). Use ${VAR} for values from erpc-secrets.
  #   When redis.enabled + database.sharedState.enabled, chart appends database.sharedState (Redis) per
  #   https://docs.erpc.cloud/config/database/shared-state
  #   When database.evmJsonRpcCache.enabled + postgres.enabled, POSTGRES_CACHE_URI defaults to CloudNativePG
  #   app secret `<cluster>-app` key `uri`. Override via erpc-secrets only if useCnpgAppSecret: false.
  config: |
    logLevel: info
    projects:
      - id: main
        networkDefaults:
          failsafe:
            timeout:
              duration: 15s
            retry:
              maxAttempts: 3
              delay: 0ms
            hedge:
              delay: 500ms
              maxCount: 2
          evm:
            statePollerInterval: 3s
            getLogsSplitOnError: true
            getLogsSplitConcurrency: 4
            getLogsMaxAllowedRange: 10000
            integrity:
              enforceHighestBlock: true
              enforceGetLogsBlockRange: true
        networks:
          - architecture: evm
            evm:
              chainId: 999
              fallbackFinalityDepth: 5
        upstreamDefaults:
          failsafe:
            timeout:
              duration: 10s
            retry:
              maxAttempts: 2
              delay: 500ms
              backoffFactor: 2
        upstreams:
          - endpoint: quicknode://${QUICKNODE_MASTER_API_KEY}
          - endpoint: drpc://${DRPC_API_KEY}
          - endpoint: repository://evm-public-endpoints.erpc.cloud
            group: fallback
        providers:
          - vendor: alchemy
            settings:
              apiKey: ${ALCHEMY_API_KEY}
            ignoreNetworks:
              - evm:999
          - vendor: conduit
            settings:
              apiKey: ${CONDUIT_API_KEY}
            onlyNetworks:
              - evm:98866

  # -- Override secret ref (defaults to global.erpcSecretName)
  secretName: ""

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

  env:
    - name: GOGC
      value: "40"
    - name: GOMEMLIMIT
      value: "1900MiB"

  service:
    type: ClusterIP
    httpPort: 4000
    metricsPort: 4001

  # -- Must be same or greater than server.maxTimeout in erpc.yaml
  terminationGracePeriodSeconds: 180

  startupProbe:
    httpGet:
      path: /healthcheck
      port: 4000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  readinessProbe:
    httpGet:
      path: /healthcheck
      port: 4000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 2
    successThreshold: 1

  livenessProbe:
    tcpSocket:
      port: 4000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 80
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80

  # -- Prometheus ServiceMonitor for kube-prometheus-stack (in namespace monitoring).
  #    ServiceMonitor is created in the release namespace by default so Prometheus can discover
  #    the eRPC service; ensure Prometheus watches this namespace (e.g. serviceMonitorNamespaceSelector)
  #    or add labels so your Prometheus instance selects this monitor (e.g. release: kube-prometheus-stack).
  metrics:
    serviceMonitor:
      enabled: false
      # -- Leave empty to use release namespace. Set only if deploying eRPC into the monitoring namespace.
      namespace: ""
      interval: 30s
      # -- Labels for Prometheus serviceMonitorSelector. For kube-prometheus-stack use:
      #    release: kube-prometheus-stack
      labels: {}
      scrapeTimeout: 10s

  # Database integration (merged into erpc.yaml unless you already define the same keys).
  database:
    # Shared state across replicas via Redis (recommended for HPA). Ignored if redis.enabled is false.
    # With redis.auth.enabled, set REDIS_SHARED_STATE_URI in erpc-secrets (full redis://... URI).
    sharedState:
      enabled: true
    # Persistent EVM JSON-RPC cache on PostgreSQL (see postgres.enabled). Uses CNPG app credentials by default.
    evmJsonRpcCache:
      enabled: false
      # When true (default): POSTGRES_CACHE_URI from secret `<cnpg-cluster>-app`, key `uri` (same as CloudNative-PG app user).
      # Set false to supply POSTGRES_CACHE_URI only via erpc-secrets (external Postgres).
      useCnpgAppSecret: true

# -- Bitnami Redis — shared state backend per https://docs.erpc.cloud/config/database/shared-state
#   Service: `<release-name>-redis-master:6379`
redis:
  enabled: false
  architecture: standalone
  auth:
    # Set true in production; use password or existingSecret, then wire the same secret into eRPC.
    enabled: false
    password: ""
    # existingSecret: ""
    # existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

# -- CloudNative-PG. With evmJsonRpcCache, eRPC reads `uri` from `<clusterfullname>-app` (operator-managed).
#   Optional: set cluster.initdb.database (e.g. erpc_cache) on *new* clusters to isolate the cache DB.
postgres:
  enabled: false
  cluster:
    instances: 1
    storage:
      size: 128Gi
      storageClass: "ceph-perf3"
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 4Gi
    affinity:
      topologyKey: topology.cinder.csi.openstack.org/zone
