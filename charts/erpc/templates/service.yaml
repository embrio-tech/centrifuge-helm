{{- if .Values.erpc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "erpc.fullname" . }}
  labels:
    {{- include "erpc.labels" . | nindent 4 }}
spec:
  type: {{ .Values.erpc.service.type }}
  ports:
    - port: {{ .Values.erpc.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.erpc.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "erpc.selectorLabels" . | nindent 4 }}
{{- end }}
