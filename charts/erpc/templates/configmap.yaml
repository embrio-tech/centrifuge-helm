{{- if .Values.erpc.enabled }}
{{- $raw := .Values.erpc.config | default dict }}
{{- $cfg := dict }}
{{- if kindIs "string" $raw }}
{{- $cfg = fromYaml $raw }}
{{- else }}
{{- $cfg = deepCopy $raw }}
{{- end }}
{{- /* Coalesce auth key names: non-empty erpc.authSecretKeys wins, else global.erpcAuthSecretKeys (Helm global is merged for this release). */}}
{{- $authKeys := list }}
{{- if and .Values.erpc.authSecretKeys (gt (len .Values.erpc.authSecretKeys) 0) }}
{{- $authKeys = .Values.erpc.authSecretKeys }}
{{- else if and .Values.global.erpcAuthSecretKeys (gt (len .Values.global.erpcAuthSecretKeys) 0) }}
{{- $authKeys = .Values.global.erpcAuthSecretKeys }}
{{- end }}
{{- $authKeys = $authKeys | compact | uniq }}
{{- $authPid := .Values.erpc.authSecretKeysProjectId | default "main" }}
{{- if gt (len $authKeys) 0 }}
{{- $newProjects := list }}
{{- range $cfg.projects }}
{{- $proj := deepCopy . }}
{{- if eq .id $authPid }}
{{- $base := .auth.strategies | default list }}
{{- $merged := list }}
{{- range $base }}
{{- if ne .type "secret" }}
{{- $merged = concat $merged (list .) }}
{{- end }}
{{- end }}
{{- range $authKeys }}
{{- $merged = concat $merged (list (dict "type" "secret" "secret" (dict "value" (printf "${%s}" .)))) }}
{{- end }}
{{- $authBlock := deepCopy (.auth | default dict) }}
{{- $_ := set $authBlock "strategies" $merged }}
{{- $_ := set $proj "auth" $authBlock }}
{{- end }}
{{- $newProjects = concat $newProjects (list $proj) }}
{{- end }}
{{- $_ := set $cfg "projects" $newProjects }}
{{- end }}
{{- $db := $cfg.database | default dict | deepCopy }}
{{- $injectDb := false }}
{{- if and .Values.redis.enabled .Values.erpc.database.sharedState.enabled }}
{{- if not (hasKey $db "sharedState") }}
{{- $ss := dict
    "clusterKey" .Release.Name
    "connector" (dict "driver" "redis" "redis" (dict "uri" "${REDIS_SHARED_STATE_URI}"))
    "fallbackTimeout" "3s"
    "lockTtl" "3s"
    "lockMaxWait" "100ms"
    "updateMaxWait" "50ms"
}}
{{- $db = merge $db (dict "sharedState" $ss) }}
{{- $injectDb = true }}
{{- end }}
{{- end }}
{{- if .Values.erpc.database.evmJsonRpcCache.enabled }}
{{- if not (hasKey $db "evmJsonRpcCache") }}
{{- $cache := fromYaml (include "erpc.defaultEvmJsonRpcCache" .) }}
{{- $db = merge $db (dict "evmJsonRpcCache" $cache) }}
{{- $injectDb = true }}
{{- end }}
{{- end }}
{{- if or $injectDb (gt (len $db) 0) }}
{{- $_ := set $cfg "database" $db }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "erpc.fullname" . }}-config
  labels:
    {{- include "erpc.labels" . | nindent 4 }}
data:
  erpc.yaml: |
{{ toYaml $cfg | nindent 4 }}
{{- end }}
